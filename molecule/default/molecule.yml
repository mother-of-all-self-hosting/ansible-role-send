---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true
driver:
  name: docker
platforms:
  - name: send-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        send_debug_service_enabled: false

        # Variables for Send
        send_uid: 1000
        send_gid: 1000
        send_scheme: http
        send_hostname: localhost
        send_container_labels_traefik_enabled: false
        send_container_http_host_bind_port: 1443

        # Variables required for Send to connect to the Valkey data-store
        send_redis_hostname: "{{ valkey_identifier }}"
        send_container_additional_networks_custom:
          - "{{ valkey_container_network }}"
        send_systemd_required_services_list_custom:
          - "{{ valkey_identifier }}.service"

        # Variables for Valkey
        valkey_uid: 1000
        valkey_gid: 1000
        valkey_arch: amd64
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
verifier:
  name: ansible
